<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HNG Stage 0 - Task Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div class="app-wrapper">
    <header class="app-header">
      <h1>TO-DO List</h1>
      <button class="icon-btn add-task-btn" title="Add Task" aria-label="Add new task" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </button>
    </header>

    <main class="container">
      <article class="todo-card" id="main-card" data-testid="test-todo-card">
        
        <header class="card-header">
          <div class="title-wrapper">
            <label class="custom-checkbox">
              <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
              <span class="checkmark"></span>
              <span class="sr-only">Mark completed</span>
            </label>
            <h2 class="todo-title" id="todo-title" data-testid="test-todo-title">Optimize Webhook Architecture</h2>
          </div>
          <span class="badge priority-high" data-testid="test-todo-priority" aria-label="Priority High">High</span>
        </header>

        <p class="todo-description" id="todo-desc" data-testid="test-todo-description">Refactor the Python and SQL data logger to handle concurrent cross origin requests seamlessly.</p>

        <div class="metadata-container">
          <span class="badge status-pending" id="todo-status" data-testid="test-todo-status">Pending</span>
          
          <div class="time-wrapper">
            <time datetime="2026-04-16T12:00:00" class="due-date" data-testid="test-todo-due-date">Due Apr 16, 2026</time>
            <span class="time-remaining" id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">Due in 4 Day(s)</span>
          </div>
        </div>

        <ul class="tags-list" role="list" data-testid="test-todo-tags">
          <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag" data-testid="test-todo-tag-work">Work</li>
          <li class="tag">Backend</li>
        </ul>

        <footer class="card-footer">
          <button class="btn btn-edit" id="edit-btn" data-testid="test-todo-edit-button">Edit</button>
          <button class="btn btn-delete" id="delete-btn" data-testid="test-todo-delete-button">Delete</button>
        </footer>

      </article>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
